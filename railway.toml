[services.minio]
build:
  dockerfile = "Dockerfile.minio"

[services.minio.variables]
MINIO_ROOT_USER = "minioadmin"
MINIO_ROOT_PASSWORD = "minioadmin"

[services.minio.volumes]
data = "/data"

[services.app]
build:
  dockerfile = "Dockerfile"

[services.app.variables]
PORT = "8080"
MINIO_ENDPOINT = "minio"
MINIO_PORT = "9000"
MINIO_USE_SSL = "false"
MINIO_ACCESS_KEY = "minioadmin"
MINIO_SECRET_KEY = "minioadmin"
MINIO_BUCKET = "gallery-images"
NOMINATIM_URL = "https://nominatim.openstreetmap.org/reverse?format=jsonv2&addressdetails=1&zoom=18"
GEOCODER_USER_AGENT = "sheriffen-world/1.0 (self-hosted demo)"
CORS_ORIGIN = "*"

[services.app.depends_on]
minio = "healthy"
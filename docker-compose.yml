services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-gallery-images}
      NOMINATIM_URL: "https://nominatim.openstreetmap.org/reverse?format=jsonv2&addressdetails=1&zoom=18"
      GEOCODER_USER_AGENT: "sheriffen-world/1.0 (self-hosted demo)"
      CORS_ORIGIN: "*"
    ports:
      - "8080:8080"

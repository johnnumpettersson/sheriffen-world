services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: gallery-images
      NOMINATIM_URL: "https://nominatim.openstreetmap.org/reverse?format=jsonv2&addressdetails=1&zoom=18"
      GEOCODER_USER_AGENT: "sheriffen-world/1.0 (self-hosted demo)"
      CORS_ORIGIN: "*"
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  minio-data:
